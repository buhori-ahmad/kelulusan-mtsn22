body {

.container {
    max-width: 700px;
    margin: 40px auto;
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);

    height:140px;

}

    border-radius:10px;

    font-size:16px;

    margin-top:15px;

    border-radius:10px;

    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover {
    opacity:0.9;
}
.result {
    margin-top:30px;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:left;
}
.success {
    color:#86efac;
    font-weight:bold;
}
.footer {
    margin-top:25px;
    font-size:13px;
    opacity:0.8;
}
a.download {
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:#facc15;
    color:#111827;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

function cekKelulusan() {
    const nisn = document.getElementById('nisn').value.trim();
    const hasil = document.getElementById('hasil');

    const siswa = data.find(s => s.nisn === nisn);

    if(siswa) {
        hasil.innerHTML = `
        <div class="result">
            <h3>Data Siswa</h3>
            <p><strong>Nama:</strong> ${siswa.nama}</p>
            <p><strong>NISN:</strong> ${siswa.nisn}</p>
            <p><strong>TTL:</strong> ${siswa.ttl}</p>
            <p><strong>Status:</strong> <span class="success">${siswa.status}</span></p>
            <a class="download" href="${siswa.skl}" target="_blank">Download SKL</a>
        </div>
        `;
    } else {
        hasil.innerHTML = `
        <div class="result">
            <p>Data tidak ditemukan. Periksa kembali NISN Anda.</p>
        </div>
        `;
    }
}
